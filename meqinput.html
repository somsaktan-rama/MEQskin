<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEQ Data Entry-1.30</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- SweetAlert2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .header-banner { background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: white; padding: 20px 0; }
    .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-nav { width: 100px; }
  </style>
</head>
<body>

  <!-- ส่วนหัว -->
  <div class="header-banner mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <h3 class="m-0">⌨️ MEQ Data Entry 1.30</h3>
    </div>
  </div>

  <div class="container">
    
    <!-- SECTION 1: หน้าโหลดข้อมูลและเลือกข้อสอบ -->
<div id="setupSection" class="card p-4 mb-4 mx-auto" style="max-width: 600px;">
      <h5 class="mb-3 text-primary border-bottom pb-2">📥 ยืนยันตัวตนเพื่อโหลดชุดข้อสอบ</h5>
      
      <div class="mb-4">
        <label class="form-label fw-bold">1. รหัสเจ้าหน้าที่ (MDID):</label>
        <div class="input-group shadow-sm">
          <input type="password" id="staffMdid" class="form-control form-control-lg border-primary" placeholder="กรอก MDID ของคุณ">
          <button class="btn btn-outline-primary fw-bold px-4" onclick="loadMeqDropdown()">ตรวจสอบ</button>
        </div>
      </div>

      <div id="dropdownContainer" style="display: none;">
        <div class="mb-4">
          <label class="form-label fw-bold">2. เลือกชุดข้อสอบ (MEQ ID):</label>
          <select id="loadMeqId" class="form-select form-select-lg border-success shadow-sm">
            <option value="">⏳ กำลังดึงข้อมูลข้อสอบจากระบบ...</option>
          </select>
        </div>
        <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="startDataEntry()">🚀 เริ่มต้นกรอกข้อมูล</button>
      </div>
    </div>

    <!-- SECTION 2: หน้าฟอร์มกรอกข้อมูล (แสดงทุกข้อย่อย) -->
    <div id="entrySection" style="display: none;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-outline-danger fw-bold shadow-sm" onclick="exitEntry()">🚪 ออก / โหลดชุดใหม่</button>
        <span class="badge bg-secondary fs-6 shadow-sm" id="statusBadge">พร้อมทำงาน</span>
      </div>

      <div class="card border-primary mb-4">
        <!-- แถบหัวข้อ -->
        <div class="card-header bg-primary text-white p-3 text-center">
          <h5 class="mb-0 fw-bold" id="qLabel">รหัสข้อสอบ: - </h5>
        </div>
        
        <div class="card-body text-center p-4 bg-white">
          <!-- แสดงรหัสนักเรียนปัจจุบัน -->
          <div class="mb-4">
            <span class="badge bg-info text-dark fs-4 px-4 py-2 shadow-sm rounded-pill" id="sLabel">นักศึกษา: R01</span>
          </div>

          <!-- กล่องบรรจุข้อย่อยทั้งหมด จะถูกสร้างด้วย JavaScript ที่นี่ -->
          <div id="questionsContainer" class="mb-4">
             <!-- กล่อง Textarea จะเรียงกันลงมาที่นี่ -->
          </div>

          <hr>
          <!-- ปุ่มเลื่อนนักเรียน (Student Nav) และปุ่ม Save -->
          <div class="d-flex justify-content-center flex-wrap gap-2 mt-4">
            <button class="btn btn-secondary btn-nav fw-bold shadow-sm" onclick="changeStudent('TOP')">⏮ Top (1)</button>
            <button class="btn btn-outline-secondary btn-nav fw-bold shadow-sm" onclick="changeStudent('PREV')">◀ กลับ</button>
            
            <!-- ปุ่มบันทึก -->
            <button id="btnSave" class="btn btn-success fw-bold px-5 mx-2 shadow" style="font-size: 1.2rem;" onclick="saveAnswer()">💾 บันทึกคนนี้ (SAVE)</button>
            
            <button class="btn btn-outline-secondary btn-nav fw-bold shadow-sm" onclick="changeStudent('NEXT')">ถัดไป ▶</button>
            <button class="btn btn-secondary btn-nav fw-bold shadow-sm" onclick="changeStudent('LAST')">Last (32) ⏭</button>
          </div>
          <p class="text-muted mt-3 mb-0 small">*กด Save แล้วระบบจะบันทึกทุกข้อ และเลื่อนไปนักเรียนคนถัดไปให้อัตโนมัติ</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

  <script>
    // ==========================================
    // 🔴 1. ใส่ URL ของ Google Apps Script ของคุณที่นี่ (ต้องลงท้ายด้วย /exec)
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_lyPkLqxlLejGEB0j-VTxvMWe9CCBsULgYoOjog560IjzL9I-fEsv8aVZo3Y7HDik/exec"; 

    // ตัวแปรเก็บข้อมูล
    let questionsData = [];
    let currentSNum = 1;

    // ==========================================
    // 2. ฟังก์ชันติดต่อ Backend (อัปเดตแก้ปัญหา 405 CORS & Redirect)
    // ==========================================
    async function callAPI(action, payload = {}) {
      if(GAS_URL === "วาง_URL_WEB_APP_ของคุณที่นี่" || GAS_URL === "") {
        throw new Error("คุณยังไม่ได้ใส่ GAS_URL ในโค้ดครับ");
      }
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          redirect: "follow", 
          body: JSON.stringify({ action: action, payload: payload })
        });
        
        const rawText = await response.text();
        
        try {
          return JSON.parse(rawText);
        } catch (parseError) {
          console.error("Google ส่งข้อมูลกลับมาผิดปกติ (ไม่ใช่ JSON):", rawText);
          throw new Error("การเชื่อมต่อผิดพลาด! (ตรวจสอบ Console Log)");
        }
        
      } catch (error) {
        console.error("API Error:", error);
        return { success: false, message: error.message };
      }
    }


// (ลบฟังก์ชัน window.onload เดิมทิ้งไปเลยครับ)

    // ==========================================
    // 3. ฟังก์ชันดึงข้อมูลข้อสอบมาใส่ Dropdown (ส่ง MDID ไปด้วย)
    // ==========================================
    async function loadMeqDropdown() {
      const mdidInput = document.getElementById('staffMdid').value.trim();
      if (!mdidInput) {
        Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสเจ้าหน้าที่ (MDID) ก่อนครับ', 'warning');
        return;
      }

      const select = document.getElementById('loadMeqId');
      
      // แสดง Loading ระหว่างรอข้อมูล
      Swal.fire({ title: 'กำลังตรวจสอบสิทธิ์...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      // 🟢 ส่ง MDID แนบไปกับ Payload
      const res = await callAPI('getMeqIdListForEntry', { mdid: mdidInput });
      Swal.close();
      
      if (res.success && res.data.length > 0) {
        select.innerHTML = '';
        res.data.forEach(item => {
          let option = document.createElement('option');
          option.value = item.meqId;
          option.text = `ข้อ ${item.no} (รหัส: ${item.meqId})`;
          select.appendChild(option);
        });
        
        // 🟢 ตรวจสอบผ่าน เปิดให้เห็นช่อง Dropdown
        document.getElementById('dropdownContainer').style.display = 'block';
        document.getElementById('staffMdid').readOnly = true; // ล็อกช่อง MDID ไว้

      } else {
        document.getElementById('dropdownContainer').style.display = 'none';
        Swal.fire('ไม่มีสิทธิ์', res.message || 'ไม่พบชุดข้อสอบที่คุณมีสิทธิ์เข้าถึง', 'error');
      }
    }
    
    // ==========================================
    // 4. ฟังก์ชันเริ่มโหลดชุดข้อสอบเพื่อเข้าสู่หน้ากรอกข้อมูล
    // ==========================================
    async function startDataEntry() {
      const meqId = document.getElementById('loadMeqId').value.trim() || "ALL";
      
      Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const res = await callAPI('getStudentAnswers', meqId);
      Swal.close();

      if (res.success && res.data.length > 0) {
        questionsData = res.data;
        currentSNum = 1;
        
        // สลับหน้าจอ
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('entrySection').style.display = 'block';
        
        renderUI();
      } else {
        Swal.fire('ไม่พบข้อมูล', res.message || 'ไม่พบข้อสอบที่ระบุในชีต Student_Answers', 'warning');
      }
    }

// ==========================================
    // 5. ฟังก์ชันวาดหน้าจอ (เพิ่มปุ่มดูโจทย์และขยายช่องคะแนน)
    // ==========================================
    function renderUI() {
      if(questionsData.length === 0) return;
      
      let sKey = "R" + currentSNum.toString().padStart(2, '0');
      let meqId = questionsData[0].meq_id;
      
      document.getElementById('qLabel').innerText = `รหัสชุดข้อสอบ: ${meqId}`;
      document.getElementById('sLabel').innerText = `นักศึกษา: ${sKey}`;
      
      const container = document.getElementById('questionsContainer');
      container.innerHTML = ''; 
      
      questionsData.forEach((q, index) => {
        let ansVal = q.answers[sKey] || "";
        let scoreVal = q.scores[sKey] || ""; 
        
        // แปลงข้อความโจทย์ให้ปลอดภัยก่อนเอาไปใส่ปุ่ม (ดักจับ Single/Double Quotes และการขึ้นบรรทัดใหม่)
        let safeQText = q.question_text ? q.question_text.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "<br>") : "-";
        
        container.innerHTML += `
          <div class="mb-4 text-start p-3 border rounded bg-light shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
              <div class="d-flex align-items-center">
                <label class="form-label fw-bold text-primary fs-5 mb-0 me-2">ข้อย่อย ${q.sub_question}:</label>
                <button class="btn btn-sm btn-outline-info fw-bold rounded-pill px-3 shadow-sm" onclick="showQuestionText('${safeQText}')">👁️ ดูโจทย์</button>
              </div>
              <div class="d-flex align-items-center">
                <label class="fw-bold me-2 text-success">คะแนน:</label>
                <input type="number" id="score_${index}" class="form-control border-success text-center fw-bold fs-5" style="width: 120px;" value="${scoreVal}" step="0.5" min="0" placeholder="0">
              </div>
            </div>
            
            <textarea id="ans_${index}" class="form-control border-info" rows="3" style="font-size: 1.1rem;" placeholder="พิมพ์คำตอบข้อย่อย ${q.sub_question}...">${ansVal}</textarea>
          </div>
        `;
      });

      if(document.getElementById('ans_0')) document.getElementById('ans_0').focus();
    }

    // 🟢 ฟังก์ชันสำหรับ Pop-up แสดงข้อความโจทย์
    function showQuestionText(text) {
      Swal.fire({
        title: '📖 ข้อความโจทย์',
        html: `<div class="text-start fs-5 mt-3 p-3 bg-light border rounded">${text}</div>`,
        icon: 'info',
        confirmButtonText: 'ปิด',
        width: '600px'
      });
    }
    
    // ==========================================
    // 6. ระบบนำทางนักเรียน (Navigation)
    // ==========================================
    function changeStudent(action) {
      if (action === 'TOP') currentSNum = 1;
      else if (action === 'LAST') currentSNum = 32;
      else if (action === 'PREV' && currentSNum > 1) currentSNum--;
      else if (action === 'NEXT' && currentSNum < 32) currentSNum++;
      renderUI();
    }

   // ==========================================
    // 7. ฟังก์ชันบันทึกข้อมูล (เพิ่มระบบเช็คคะแนนรวม <= 100)
    // ==========================================
    async function saveAnswer() {
      let sKey = "R" + currentSNum.toString().padStart(2, '0');
      let targetCol = 3 + currentSNum; 
      
      let answersToSave = [];
      let totalScore = 0; // 🟢 ตัวแปรสำหรับคำนวณคะแนนรวม
      
      for (let index = 0; index < questionsData.length; index++) {
        let q = questionsData[index];
        let answerText = document.getElementById(`ans_${index}`).value;
        let scoreValue = document.getElementById(`score_${index}`).value; 
        
        // บวกคะแนนรวม
        let numScore = parseFloat(scoreValue) || 0;
        totalScore += numScore;
        
        q.answers[sKey] = answerText;
        q.scores[sKey] = scoreValue; 
        
        answersToSave.push({ rowIndex: q.rowIndex, answer: answerText, score: scoreValue });
      }
      
      // 🟢 เช็คลิมิต: ถ้าคะแนนรวมเกิน 100 ให้เด้งเตือนและหยุดการบันทึก
      if (totalScore > 100) {
        Swal.fire({
          title: 'คะแนนรวมเกินขีดจำกัด!',
          text: `คะแนนรวมปัจจุบันคือ ${totalScore} คะแนน (ต้องไม่เกิน 100)`,
          icon: 'warning',
          confirmButtonText: 'แก้ไขคะแนน'
        });
        return; // ออกจากฟังก์ชัน ไม่ส่งข้อมูลไปเซฟ
      }
      
      const btn = document.getElementById('btnSave');
      const status = document.getElementById('statusBadge');
      
      btn.innerHTML = '⏳ Saving...';
      btn.disabled = true;
      status.className = 'badge bg-warning text-dark fs-6';
      status.innerText = 'กำลังบันทึก...';

      const res = await callAPI('saveMultipleAnswers', { studentColIndex: targetCol, answers: answersToSave });
      
      btn.innerHTML = '💾 บันทึกคนนี้ (SAVE)';
      btn.disabled = false;

      if (res.success) {
        status.className = 'badge bg-success fs-6';
        status.innerText = 'บันทึกสำเร็จ';
        
        if (currentSNum < 32) {
          changeStudent('NEXT'); 
        } else {
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เสร็จสิ้นคนที่ 32 แล้ว!', showConfirmButton: false, timer: 2000 });
        }
      } else {
        status.className = 'badge bg-danger fs-6';
        status.innerText = 'บันทึกพลาด!';
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
      }
    }
    
    // ==========================================
    // 8. ออกจากหน้าฟอร์ม
    // ==========================================
    function exitEntry() {
      Swal.fire({
        title: 'ต้องการออกใช่หรือไม่?', text: "ระบบจะกลับไปหน้าตั้งค่าเพื่อโหลดชุดข้อสอบใหม่", icon: 'question',
        showCancelButton: true, confirmButtonText: 'ใช่, ออกเลย'
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById('setupSection').style.display = 'block';
          document.getElementById('entrySection').style.display = 'none';
          document.getElementById('dropdownContainer').style.display = 'none'; // ซ่อน Dropdown
          document.getElementById('staffMdid').readOnly = false; // ปลดล็อกช่อง MDID
          document.getElementById('staffMdid').value = ''; // ล้างค่า
          questionsData = [];
        }
      });
    }
    
  </script>
</body>
</html>
