<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEQ Data Entry-กรอกคำตอบ 1.04</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css" rel="stylesheet">
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .header-banner { background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: white; padding: 20px 0; }
    .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn-nav { width: 100px; }
  </style>
</head>
<body>

  <div class="header-banner mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <h3 class="m-0">⌨️ MEQ Data Entry 1.04</h3>
    </div>
  </div>

  <div class="container">
    
    <div id="setupSection" class="card p-4 mb-4 mx-auto" style="max-width: 600px;">
      <h5 class="mb-3 text-primary border-bottom pb-2">📥 โหลดชุดข้อสอบเพื่อเริ่มคีย์ข้อมูล</h5>
      
    <div class="mb-3">
        <label class="form-label fw-bold">เลือกชุดข้อสอบ (MEQ ID):</label>
        <select id="loadMeqId" class="form-select form-select-lg border-primary shadow-sm">
          <option value="">⏳ กำลังดึงข้อมูลข้อสอบจากระบบ...</option>
        </select>
      </div>
      
      <button class="btn btn-primary btn-lg w-100 fw-bold" onclick="startDataEntry()">🚀 เริ่มต้นกรอกข้อมูล</button>
    </div>

    <div class="card border-primary mb-4">
        <div class="card-header bg-primary text-white p-3 text-center">
          <h5 class="mb-0 fw-bold" id="qLabel">รหัสข้อสอบ: - </h5>
        </div>
        
        <div class="card-body text-center p-4 bg-white">
          <div class="mb-4">
            <span class="badge bg-info text-dark fs-4 px-4 py-2 shadow-sm rounded-pill" id="sLabel">นักศึกษา: R01</span>
          </div>

          <div id="questionsContainer" class="mb-4">
             </div>

          <hr>
          <div class="d-flex justify-content-center flex-wrap gap-2 mt-4">
            <button class="btn btn-secondary btn-nav fw-bold" onclick="changeStudent('TOP')">⏮ Top (1)</button>
            <button class="btn btn-outline-secondary btn-nav fw-bold" onclick="changeStudent('PREV')">◀ กลับ</button>
            
            <button id="btnSave" class="btn btn-success fw-bold px-5 mx-2 shadow" style="font-size: 1.2rem;" onclick="saveAnswer()">💾 บันทึกคนนี้ (SAVE)</button>
            
            <button class="btn btn-outline-secondary btn-nav fw-bold" onclick="changeStudent('NEXT')">ถัดไป ▶</button>
            <button class="btn btn-secondary btn-nav fw-bold" onclick="changeStudent('LAST')">Last (32) ⏭</button>
          </div>
          <p class="text-muted mt-3 mb-0 small">*กด Save แล้วระบบจะบันทึกทุกข้อ และเลื่อนไปนักเรียนคนถัดไปให้อัตโนมัติ</p>
        </div>
      </div>
        
        <div class="card-body text-center p-4 p-md-5 bg-white">
          <div class="mb-4">
            <span class="badge bg-info text-dark fs-4 px-4 py-2 shadow-sm rounded-pill" id="sLabel">นักศึกษา: R01</span>
          </div>

          <textarea id="answerInput" class="form-control mb-4 shadow-sm border-info bg-light" rows="8" style="font-size: 1.2rem;" placeholder="พิมพ์คำตอบของนักเรียนลงที่นี่..."></textarea>

          <div class="d-flex justify-content-center flex-wrap gap-2">
            <button class="btn btn-secondary btn-nav fw-bold" onclick="changeStudent('TOP')">⏮ Top (1)</button>
            <button class="btn btn-outline-secondary btn-nav fw-bold" onclick="changeStudent('PREV')">◀ ก่อนหน้า</button>
            
            <button id="btnSave" class="btn btn-success fw-bold px-5 mx-2 shadow" style="font-size: 1.2rem;" onclick="saveAnswer()">💾 SAVE</button>
            
            <button class="btn btn-outline-secondary btn-nav fw-bold" onclick="changeStudent('NEXT')">ถัดไป ▶</button>
            <button class="btn btn-secondary btn-nav fw-bold" onclick="changeStudent('LAST')">Last (32) ⏭</button>
          </div>
          <p class="text-muted mt-3 mb-0 small">*กด Save แล้วระบบจะเลื่อนไปนักเรียนคนถัดไปให้อัตโนมัติ</p>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

  <script>
    // ==========================================
    // 🔴 1. ใส่ URL ของ Google Apps Script ของคุณที่นี่
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwXE0Jp7biIPiuWrjQ2i8PWcrp9aiHYkfAsTeO32lGIng7mCACAMQou2xFlc8NKvd91/exec"; 

    // ตัวแปรเก็บข้อมูล
    let questionsData = [];
    let currentQIndex = 0;
    let currentSNum = 1;

   // ==========================================
    // 2. ฟังก์ชันติดต่อ Backend (อัปเดตแก้ปัญหา 405 CORS & Redirect)
    // ==========================================
    async function callAPI(action, payload = {}) {
      if(GAS_URL === "วาง_URL_WEB_APP_ของคุณที่นี่" || GAS_URL === "") {
        throw new Error("คุณยังไม่ได้ใส่ GAS_URL ในโค้ดครับ");
      }
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          // 🟢 เพิ่ม 2 บรรทัดนี้เพื่อแก้ปัญหา 405 Not Allowed จาก Google
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          redirect: "follow", 
          
          body: JSON.stringify({ action: action, payload: payload })
        });
        
        const rawText = await response.text();
        
        try {
          return JSON.parse(rawText);
        } catch (parseError) {
          console.error("Google ส่งข้อมูลกลับมาผิดปกติ (ไม่ใช่ JSON):", rawText);
          throw new Error("การเชื่อมต่อผิดพลาด! (ตรวจสอบ Console Log)");
        }
        
      } catch (error) {
        console.error("API Error:", error);
        return { success: false, message: error.message };
      }
    }

    // ==========================================
    // 3. ฟังก์ชันโหลดข้อมูลข้อสอบ
    // ==========================================
    async function startDataEntry() {
      const meqId = document.getElementById('loadMeqId').value.trim() || "ALL";
      
      Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const res = await callAPI('getStudentAnswers', meqId);
      Swal.close();

      if (res.success && res.data.length > 0) {
        questionsData = res.data;
        currentQIndex = 0;
        currentSNum = 1;
        
        // สลับหน้าจอ
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('entrySection').style.display = 'block';
        
        renderUI();
      } else {
        Swal.fire('ไม่พบข้อมูล', res.message || 'ไม่พบข้อสอบที่ระบุในชีต Student_Answers', 'warning');
      }
    }

    // ==========================================
    // 4. ฟังก์ชันวาดหน้าจอ (Render หลายข้อในหน้าเดียว)
    // ==========================================
    function renderUI() {
      if(questionsData.length === 0) return;
      
      let sKey = "R" + currentSNum.toString().padStart(2, '0');
      let meqId = questionsData[0].meq_id; // ดึงรหัสข้อสอบจากข้อแรก
      
      document.getElementById('qLabel').innerText = `รหัสชุดข้อสอบ: ${meqId}`;
      document.getElementById('sLabel').innerText = `นักศึกษา: ${sKey}`;
      
      const container = document.getElementById('questionsContainer');
      container.innerHTML = ''; // ล้างของเก่าออก
      
      // วนลูปสร้างกล่องกรอกคำตอบตามจำนวนข้อย่อย
      questionsData.forEach((q, index) => {
        let val = q.answers[sKey] || "";
        
        container.innerHTML += `
          <div class="mb-4 text-start p-3 border rounded bg-light shadow-sm">
            <label class="form-label fw-bold text-primary fs-5">ข้อย่อย ${q.sub_question}:</label>
            <textarea id="ans_${index}" class="form-control border-info" rows="3" style="font-size: 1.1rem;" placeholder="พิมพ์คำตอบข้อย่อย ${q.sub_question}...">${val}</textarea>
          </div>
        `;
      });

      // นำ Cursor ไปกระพริบรอที่ข้อ 1 ทันที
      if(document.getElementById('ans_0')) document.getElementById('ans_0').focus();
    }

    // ==========================================
    // 5. ระบบนำทางนักเรียน (Navigation)
    // ==========================================
    function changeStudent(action) {
      if (action === 'TOP') currentSNum = 1;
      else if (action === 'LAST') currentSNum = 32;
      else if (action === 'PREV' && currentSNum > 1) currentSNum--;
      else if (action === 'NEXT' && currentSNum < 32) currentSNum++;
      renderUI();
    }

    // ==========================================
    // 6. ฟังก์ชันบันทึกข้อมูลแบบหลายข้อ (Bulk Save)
    // ==========================================
    async function saveAnswer() {
      let sKey = "R" + currentSNum.toString().padStart(2, '0');
      let targetCol = 3 + currentSNum; 
      
      let answersToSave = [];
      
      // ดึงข้อมูลจากทุก Textarea ใส่ Array
      questionsData.forEach((q, index) => {
        let answerText = document.getElementById(`ans_${index}`).value;
        q.answers[sKey] = answerText; // อัปเดตใน Memory เพื่อให้สลับคนแล้วไม่หาย
        answersToSave.push({ rowIndex: q.rowIndex, answer: answerText });
      });
      
      const btn = document.getElementById('btnSave');
      const status = document.getElementById('statusBadge');
      
      btn.innerHTML = '⏳ Saving...';
      btn.disabled = true;
      status.className = 'badge bg-warning text-dark fs-6';
      status.innerText = 'กำลังบันทึก...';

      // ยิงข้อมูลทั้ง Array ไปเซฟที่ Backend ครั้งเดียว (เร็วและประหยัด API)
      const res = await callAPI('saveMultipleAnswers', { studentColIndex: targetCol, answers: answersToSave });
      
      btn.innerHTML = '💾 บันทึกคนนี้ (SAVE)';
      btn.disabled = false;

      if (res.success) {
        status.className = 'badge bg-success fs-6';
        status.innerText = 'บันทึกสำเร็จ';
        
        // เลื่อนนักเรียนอัตโนมัติ
        if (currentSNum < 32) {
          changeStudent('NEXT'); 
        } else {
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เสร็จสิ้นคนที่ 32 แล้ว!', showConfirmButton: false, timer: 2000 });
        }
      } else {
        status.className = 'badge bg-danger fs-6';
        status.innerText = 'บันทึกพลาด!';
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้', 'error');
      }
    }

    // ==========================================
    // 7. ออกจากหน้าฟอร์ม
    // ==========================================
    function exitEntry() {
      Swal.fire({
        title: 'ต้องการออกใช่หรือไม่?', text: "ระบบจะกลับไปหน้าตั้งค่าเพื่อโหลดชุดข้อสอบใหม่", icon: 'question',
        showCancelButton: true, confirmButtonText: 'ใช่, ออกเลย'
      }).then((result) => {
        if (result.isConfirmed) {
          document.getElementById('setupSection').style.display = 'block';
          document.getElementById('entrySection').style.display = 'none';
          document.getElementById('loadMeqId').value = 'ALL';
          questionsData = [];
        }
      });
    }

    // ==========================================
    // ฟังก์ชันดึงข้อมูลข้อสอบมาใส่ Dropdown ทันทีที่โหลดหน้าเว็บเสร็จ
    // ==========================================
    window.onload = async function() {
      await loadMeqDropdown();
    };

    async function loadMeqDropdown() {
      const select = document.getElementById('loadMeqId');
      
      // ดึงข้อมูลจาก API
      const res = await callAPI('getMeqIdListForEntry');
      
      if (res.success && res.data.length > 0) {
        // เคลียร์ค่าเดิมและใส่ตัวเลือกแรก
        select.innerHTML = '<option value="ALL">-- โหลดข้อสอบทั้งหมดในระบบ (ALL) --</option>';
        
        // วนลูปนำข้อมูลข้อสอบมาสร้างเป็น Dropdown list
        res.data.forEach(item => {
          let option = document.createElement('option');
          option.value = item.meqId;
          option.text = `ข้อ ${item.no} (รหัส: ${item.meqId})`;
          select.appendChild(option);
        });
      } else {
        // ถ้าไม่พบข้อสอบในชีตเลย
        select.innerHTML = '<option value="ALL">-- ยังไม่มีข้อมูลข้อสอบในระบบ --</option>';
      }
    }
    
  </script>
</body>
</html>
